
services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - user_service_1
      - user_service_2
      - user_service_3
      - tweet_service_1
      - tweet_service_2
      - tweet_service_3
      - timeline_service_1
      - timeline_service_2
      - timeline_service_3
    networks:
      - mini_twitter_net
    restart: unless-stopped

  # --- User Service: 3 instances ---
  user_service_1:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    environment:
      - SERVICE_NAME=user
      - INSTANCE_ID=1
    env_file: .env
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_started
      redis_celebrity:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - mini_twitter_net
    restart: unless-stopped

  user_service_2:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    environment:
      - SERVICE_NAME=user
      - INSTANCE_ID=2
    env_file: .env
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_started
      redis_celebrity:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - mini_twitter_net
    restart: unless-stopped

  user_service_3:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    environment:
      - SERVICE_NAME=user
      - INSTANCE_ID=3
    env_file: .env
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_started
      redis_celebrity:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - mini_twitter_net
    restart: unless-stopped

  # --- Tweet Service: 3 instances ---
  tweet_service_1:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    environment:
      - SERVICE_NAME=tweet
      - INSTANCE_ID=1
    env_file: .env
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_started
      redis_celebrity:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - mini_twitter_net
    restart: unless-stopped

  tweet_service_2:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    environment:
      - SERVICE_NAME=tweet
      - INSTANCE_ID=2
    env_file: .env
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_started
      redis_celebrity:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - mini_twitter_net
    restart: unless-stopped

  tweet_service_3:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    environment:
      - SERVICE_NAME=tweet
      - INSTANCE_ID=3
    env_file: .env
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_started
      redis_celebrity:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - mini_twitter_net
    restart: unless-stopped

  # --- Timeline Service: 3 instances ---
  timeline_service_1:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    environment:
      - SERVICE_NAME=timeline
      - INSTANCE_ID=1
    env_file: .env
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_started
      redis_celebrity:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - mini_twitter_net
    restart: unless-stopped

  timeline_service_2:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    environment:
      - SERVICE_NAME=timeline
      - INSTANCE_ID=2
    env_file: .env
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_started
      redis_celebrity:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - mini_twitter_net
    restart: unless-stopped

  timeline_service_3:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
    environment:
      - SERVICE_NAME=timeline
      - INSTANCE_ID=3
    env_file: .env
    depends_on:
      postgres_primary:
        condition: service_healthy
      redis:
        condition: service_started
      redis_celebrity:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - mini_twitter_net
    restart: unless-stopped

  # --- PostgreSQL Primary ---
  postgres_primary:
    image: postgres:15
    environment:
      POSTGRES_USER: twitter
      POSTGRES_PASSWORD: twitter
      POSTGRES_DB: twitter
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./scripts/primary_init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    networks:
      - mini_twitter_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twitter"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- PostgreSQL Replica 1 ---
  postgres_replica1:
    image: postgres:15
    environment:
      POSTGRES_USER: twitter
      POSTGRES_PASSWORD: twitter
      PGUSER: twitter
      PGPASSWORD: twitter
    volumes:
      - postgres_replica1_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    depends_on:
      postgres_primary:
        condition: service_healthy
    entrypoint: |
      bash -c '
      if [ ! -f "$$PGDATA/PG_VERSION" ]; then
        echo "Replica 1: Waiting for primary to be ready..."
        until pg_isready -h postgres_primary -U twitter; do sleep 2; done
        sleep 5
        rm -rf /var/lib/postgresql/data/*
        PGPASSWORD=replicator_pass pg_basebackup -h postgres_primary -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R
        echo "hot_standby = on" >> /var/lib/postgresql/data/postgresql.conf
        chown -R postgres:postgres /var/lib/postgresql/data
        chmod 700 /var/lib/postgresql/data
      fi
      exec docker-entrypoint.sh postgres
      '
    networks:
      - mini_twitter_net
    restart: unless-stopped

  # --- PostgreSQL Replica 2 ---
  postgres_replica2:
    image: postgres:15
    environment:
      POSTGRES_USER: twitter
      POSTGRES_PASSWORD: twitter
      PGUSER: twitter
      PGPASSWORD: twitter
    volumes:
      - postgres_replica2_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    depends_on:
      postgres_primary:
        condition: service_healthy
    entrypoint: |
      bash -c '
      if [ ! -f "$$PGDATA/PG_VERSION" ]; then
        echo "Replica 2: Waiting for primary to be ready..."
        until pg_isready -h postgres_primary -U twitter; do sleep 2; done
        sleep 5
        rm -rf /var/lib/postgresql/data/*
        PGPASSWORD=replicator_pass pg_basebackup -h postgres_primary -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R
        echo "hot_standby = on" >> /var/lib/postgresql/data/postgresql.conf
        chown -R postgres:postgres /var/lib/postgresql/data
        chmod 700 /var/lib/postgresql/data
      fi
      exec docker-entrypoint.sh postgres
      '
    networks:
      - mini_twitter_net
    restart: unless-stopped

  # --- Redis (main) ---
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - mini_twitter_net
    restart: unless-stopped

  # --- Redis Celebrity (SEPARATE dedicated instance) ---
  redis_celebrity:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    networks:
      - mini_twitter_net
    restart: unless-stopped

  # --- Kafka (KRaft mode, no Zookeeper) ---
  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    networks:
      - mini_twitter_net
    restart: unless-stopped

  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - mini_twitter_net
    restart: unless-stopped

volumes:
  postgres_primary_data:
  postgres_replica1_data:
  postgres_replica2_data:

networks:
  mini_twitter_net:
    driver: bridge
