---
# PersistentVolumeClaim for Redis main AOF data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-main-pvc
  namespace: mini-twitter
  labels:
    app: redis-main
    app.kubernetes.io/part-of: mini-twitter
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

---
# Deployment for Redis main
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-main
  namespace: mini-twitter
  labels:
    app: redis-main
    app.kubernetes.io/part-of: mini-twitter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-main
  template:
    metadata:
      labels:
        app: redis-main
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--appendonly"
            - "yes"
            - "--appendfilename"
            - "appendonly.aof"
            - "--dir"
            - "/data"
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "300Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-main-pvc

---
# ClusterIP Service for Redis main
apiVersion: v1
kind: Service
metadata:
  name: redis-main
  namespace: mini-twitter
  labels:
    app: redis-main
    app.kubernetes.io/part-of: mini-twitter
spec:
  type: ClusterIP
  selector:
    app: redis-main
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
