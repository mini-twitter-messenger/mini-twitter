---
# Ingress — path-based routing to backend services and frontend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mini-twitter-ingress
  namespace: mini-twitter
  labels:
    app.kubernetes.io/part-of: mini-twitter
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: mini-twitter.local
      http:
        paths:
          # Backend API routes (order matters — more specific first)
          - path: /users/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          - path: /tweets/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tweet-service
                port:
                  number: 8000
          - path: /timeline/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: timeline-service
                port:
                  number: 8000
          # Health check route (goes to user-service by default)
          - path: /health
            pathType: Exact
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          # Frontend catch-all (must be last)
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
