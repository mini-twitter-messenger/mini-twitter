---
# Ingress — path-based routing to backend services and frontend
# NOTE: No rewrite-target annotation — paths are forwarded to backends as-is.
# FastAPI routers define their own prefixes (/users, /tweets, /timeline),
# so the full path must be preserved.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mini-twitter-ingress
  namespace: mini-twitter
  labels:
    app.kubernetes.io/part-of: mini-twitter
spec:
  ingressClassName: nginx
  rules:
    - host: mini-twitter.local
      http:
        paths:
          # Backend API routes (Prefix paths are auto-sorted by length,
          # longest first, so ordering in YAML is not critical)
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          - path: /tweets
            pathType: Prefix
            backend:
              service:
                name: tweet-service
                port:
                  number: 8000
          - path: /timeline
            pathType: Prefix
            backend:
              service:
                name: timeline-service
                port:
                  number: 8000
          # Health check route (goes to user-service by default)
          - path: /health
            pathType: Exact
            backend:
              service:
                name: user-service
                port:
                  number: 8000
          # Frontend catch-all (must be last — serves the React SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
