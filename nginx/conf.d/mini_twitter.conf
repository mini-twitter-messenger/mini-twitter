limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

upstream user_service {
    least_conn;
    server user_service_1:8000;
    server user_service_2:8000;
    server user_service_3:8000;
    keepalive 32;
}

upstream tweet_service {
    least_conn;
    server tweet_service_1:8000;
    server tweet_service_2:8000;
    server tweet_service_3:8000;
    keepalive 32;
}

upstream timeline_service {
    least_conn;
    server timeline_service_1:8000;
    server timeline_service_2:8000;
    server timeline_service_3:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    limit_req zone=api burst=20 nodelay;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";

    location = / {
        default_type application/json;
        return 200 '{"service":"Mini Twitter API","version":"1.0.0","status":"running","endpoints":{"/users/":"User service (register, login, follow, unfollow, profile)","/tweets/":"Tweet service (create, delete, get)","/timeline/":"Timeline service (home, user)"}}';
    }

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location /users/ {
        proxy_pass http://user_service;
    }

    location /tweets/ {
        proxy_pass http://tweet_service;
    }

    location /timeline/ {
        proxy_pass http://timeline_service;
    }
}
